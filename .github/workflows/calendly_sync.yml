name: Calendly Capacity Sync

  schedule:
    - cron: "0,30 12-23 * * 1-5"   # Mon–Fri  12:00–23:30 UTC (7 AM–6:30 PM CDT)
    - cron: "0    0    * * 2-6"    # Tue–Sat  00:00 UTC     (7 PM CDT previous day)

  # Allow manual trigger from the Actions tab (useful for testing)
  workflow_dispatch:

jobs:
  sync:
    name: Sync Calendly → Airtable
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run capacity sync
        env:
          CALENDLY_API_TOKEN: ${{ secrets.CALENDLY_API_TOKEN }}
          AIRTABLE_API_TOKEN: ${{ secrets.AIRTABLE_API_TOKEN }}
          AC_API_KEY:         ${{ secrets.AC_API_KEY }}
        run: python scripts/calendly_sync.py
